name: Deploy data mirror to GitHub Pages

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BASE_PATH: /${{ github.event.repository.name }}/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Scrape latest models snapshot
        id: scrape_models
        continue-on-error: true
        run: node scripts/scrape-models.mjs

      - name: Scrape status (fresh snapshot)
        if: steps.scrape_models.outcome == 'success'
        run: echo "[deploy] Scrape succeeded. Uploading freshly scraped data/models.json artifact."

      - name: Scrape status (fallback snapshot)
        if: steps.scrape_models.outcome == 'failure'
        run: echo "[deploy] Scrape failed. Falling back to repository snapshot data/models.json (last-known-good)."

      - name: Verify models snapshot exists
        if: always()
        run: |
          if [ ! -f data/models.json ]; then
            echo "::error::Missing data/models.json. Cannot continue without a models snapshot."
            exit 1
          fi

      - name: Upload scraped models artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: models-data
          path: data/models.json

  validate:
    runs-on: ubuntu-latest
    needs: scrape
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download scraped models artifact
        uses: actions/download-artifact@v4
        with:
          name: models-data
          path: data

      - name: Validate models data
        run: node scripts/validate-models.mjs data/models.json

      - name: Upload validated models artifact
        uses: actions/upload-artifact@v4
        with:
          name: validated-models-data
          path: data/models.json

  build:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download validated models artifact
        uses: actions/download-artifact@v4
        with:
          name: validated-models-data
          path: data

      - name: Build static site
        run: npm run build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
