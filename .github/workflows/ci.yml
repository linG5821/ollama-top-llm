name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: E2E
        run: npm run test:e2e

      - name: Validate schema structure
        run: npm run validate:schema-structure

      - name: Validate models data
        run: node scripts/validate-models.mjs data/models.json

      - name: Build
        run: npm run build
